<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>水素原子AR（最終版）</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
body{margin:0;}
#startBtn{
position:fixed;
top:20px;
left:20px;
z-index:999;
padding:10px 20px;
background:#06c755;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<button id="startBtn">AR開始</button>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
color-space="sRGB"
renderer="colorManagement: true;"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<!-- ===== マーカー検出 ===== -->
<a-entity mindar-image-target="targetIndex: 0">

  <!-- ===== 原子核 ===== -->
  <a-sphere position="0 0 0"
          radius="0.1"
          color="#ff4d4d"
          material="emissive:#ff0000; emissiveIntensity:0.7">
</a-sphere>

  <!-- ===== 電子雲 ===== -->
<a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 30000">

  <!-- 外側（ほぼ見えない） -->
  <a-sphere radius="1.0"
            color="#99ccff"
            opacity="0.02">
  </a-sphere>

  <!-- 中間 -->
  <a-sphere radius="0.7"
            color="#66aaff"
            opacity="0.05">
  </a-sphere>

  <!-- 中心付近（少し濃い） -->
  <a-sphere radius="0.4"
            color="#3399ff"
            opacity="0.1">
  </a-sphere>

</a-entity>

  <!-- ===== 電子（1個） ===== -->
 <a-sphere id="electron"
          radius="0.05"
          color="#ffff00"
          material="emissive:#ffff00; emissiveIntensity:1.2">
</a-sphere>

</a-entity>

</a-scene>

<script>

// AR開始
document.querySelector("#startBtn").onclick = () => {
  document.querySelector("a-scene").components["mindar-image-system"].start();
};

// ===== 電子の動き（回転＋ゆらぎ） =====
let angle = Math.random()*Math.PI*2;

setInterval(()=>{

  // 半径をゆらす（雲っぽさ）
  let r = 0.6 + 0.15*Math.sin(Date.now()*0.002);

  // 回転
  angle += 0.035;

  // 上下のゆらぎ（立体感）
  let y = 0.25*Math.sin(angle*2);

  document.querySelector("#electron").setAttribute("position",{
    x: r * Math.cos(angle),
    y: y,
    z: r * Math.sin(angle)
  });

},30);

</script>

</body>
</html>
