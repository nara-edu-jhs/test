<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>水素原子AR（3D版）</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
body{margin:0;}
#startBtn{
position:fixed;
top:20px;
left:20px;
z-index:999;
padding:10px 20px;
background:#06c755;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<button id="startBtn">AR開始</button>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
color-space="sRGB"
renderer="colorManagement: true;"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<!-- ===== ライト追加（重要） ===== -->
<a-light type="directional" position="1 2 1" intensity="1"></a-light>
<a-light type="ambient" intensity="0.4"></a-light>

<!-- ===== マーカー検出 ===== -->
<a-entity mindar-image-target="targetIndex: 0">

  <a-entity id="atom" scale="0.6 0.6 0.6">

    <!-- ===== 原子核（＋） ===== -->
    <a-entity position="0 0 0">

      <a-sphere radius="0.05"
                color="#ff4d4d"
                material="emissive:#ff0000; emissiveIntensity:0.7">
      </a-sphere>

      <!-- 立体＋ -->
      <a-entity position="0 0 0.06">
        <a-box width="0.06" height="0.015" depth="0.015" color="black"></a-box>
        <a-box width="0.015" height="0.06" depth="0.015" color="black"></a-box>
      </a-entity>

    </a-entity>

    <!-- ===== 電子雲（少し歪ませる） ===== -->
    <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 30000">

      <a-sphere radius="0.5"
                scale="1 0.8 1"
                color="#66ccff"
                material="wireframe:true; opacity:0.15">
      </a-sphere>

      <a-sphere radius="0.45"
                scale="1 0.7 1"
                color="#99ccff"
                opacity="0.08">
      </a-sphere>

      <a-sphere radius="0.35"
                scale="1 0.75 1"
                color="#66aaff"
                opacity="0.15">
      </a-sphere>

      <a-sphere radius="0.25"
                scale="1 0.7 1"
                color="#3399ff"
                opacity="0.25">
      </a-sphere>

    </a-entity>

    <!-- ===== 電子（−） ===== -->
    <a-entity id="electron">

      <a-sphere radius="0.03"
                color="#4da6ff"
                material="emissive:#4da6ff; emissiveIntensity:1.2">
      </a-sphere>

      <!-- 立体− -->
      <a-box position="0 0 0.04"
             width="0.035" height="0.01" depth="0.015"
             color="black">
      </a-box>

    </a-entity>

  </a-entity>

</a-entity>

</a-scene>

<script>

// ===== AR開始 =====
document.querySelector("#startBtn").onclick = () => {
  document.querySelector("a-scene").components["mindar-image-system"].start();
};

// ===== 基準半径 =====
let baseR = 0.5;

// ===== 電子の3D運動 =====
let angle = Math.random()*Math.PI*2;
let tilt = 0.6; // 軌道の傾き

setInterval(()=>{

  let r = baseR * (0.6 + 0.2*Math.sin(Date.now()*0.002));

  angle += 0.035;

  let x = r * Math.cos(angle);
  let z = r * Math.sin(angle) * Math.cos(tilt);
  let y = r * Math.sin(angle) * Math.sin(tilt);

  // ランダム揺らぎ
  x += (Math.random()-0.5)*0.01;
  y += (Math.random()-0.5)*0.01;
  z += (Math.random()-0.5)*0.01;

  let e = document.querySelector("#electron");

  e.setAttribute("position",{x,y,z});

},30);

</script>

</body>
</html>
