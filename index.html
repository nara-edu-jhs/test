<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>水素原子AR（濃淡3D版）</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
body{margin:0;}
#startBtn{
position:fixed;
top:20px;
left:20px;
z-index:999;
padding:10px 20px;
background:#06c755;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<button id="startBtn">AR開始</button>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
color-space="sRGB"
renderer="colorManagement: true; physicallyCorrectLights: true"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<!-- ===== ライト ===== -->
<a-light type="directional" position="1 2 1" intensity="1"></a-light>
<a-light type="ambient" intensity="0.4"></a-light>

<!-- ===== マーカー ===== -->
<a-entity mindar-image-target="targetIndex: 0">

  <a-entity id="atom" scale="0.6 0.6 0.6">

    <!-- ===== 原子核 ===== -->
    <a-entity position="0 0 0">

      <a-sphere radius="0.05"
                color="#ff4d4d"
                material="emissive:#ff0000; emissiveIntensity:0.7">
      </a-sphere>

      <!-- ＋（立体） -->
      <a-entity position="0 0 0.06">
        <a-box width="0.06" height="0.015" depth="0.015" color="black"></a-box>
        <a-box width="0.015" height="0.06" depth="0.015" color="black"></a-box>
      </a-entity>

    </a-entity>

  <!-- ===== 電子雲（超強調版） ===== -->
<a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 40000">

  <!-- 外側 -->
  <a-sphere radius="0.5"
            color="#66ccff"
            material="transparent:true; opacity:0.2; emissive:#3399ff; emissiveIntensity:0.3">
  </a-sphere>

  <!-- 中間 -->
  <a-sphere radius="0.42"
            color="#3399ff"
            material="transparent:true; opacity:0.35; emissive:#3399ff; emissiveIntensity:0.5">
  </a-sphere>

  <!-- 濃い -->
  <a-sphere radius="0.32"
            color="#0066ff"
            material="transparent:true; opacity:0.55; emissive:#0066ff; emissiveIntensity:0.7">
  </a-sphere>

  <!-- かなり濃い -->
  <a-sphere radius="0.24"
            color="#0033cc"
            material="transparent:true; opacity:0.75; emissive:#0033cc; emissiveIntensity:0.9">
  </a-sphere>

  <!-- 中心（はっきり見える） -->
  <a-sphere radius="0.16"
            color="#001a99"
            material="transparent:true; opacity:0.95; emissive:#001a99; emissiveIntensity:1.2">
  </a-sphere>

</a-entity>

    <!-- ===== 電子 ===== -->
    <a-entity id="electron">

      <a-sphere radius="0.03"
                color="#4da6ff"
                material="emissive:#4da6ff; emissiveIntensity:1.2">
      </a-sphere>

      <!-- −（立体） -->
      <a-box position="0 0 0.04"
             width="0.035" height="0.01" depth="0.015"
             color="black">
      </a-box>

    </a-entity>

  </a-entity>

</a-entity>

</a-scene>

<script>

// ===== AR開始 =====
document.querySelector("#startBtn").onclick = () => {
  document.querySelector("a-scene").components["mindar-image-system"].start();
};

// ===== 基準半径 =====
let baseR = 0.5;

// ===== 電子の3D運動 =====
let angle = Math.random()*Math.PI*2;
let tilt = 0.6;

setInterval(()=>{

  let r = baseR * (0.6 + 0.2*Math.sin(Date.now()*0.002));

  angle += 0.035;

  let x = r * Math.cos(angle);
  let z = r * Math.sin(angle) * Math.cos(tilt);
  let y = r * Math.sin(angle) * Math.sin(tilt);

  // 微小ゆらぎ
  x += (Math.random()-0.5)*0.01;
  y += (Math.random()-0.5)*0.01;
  z += (Math.random()-0.5)*0.01;

  document.querySelector("#electron")
    .setAttribute("position",{x,y,z});

},30);

</script>

</body>
</html>
