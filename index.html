<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>水素原子AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
body{margin:0;}
#startBtn{
position:fixed;
top:20px;
left:20px;
z-index:999;
padding:10px 20px;
background:#06c755;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<button id="startBtn">AR開始</button>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
color-space="sRGB"
renderer="colorManagement: true;"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<!-- マーカー検出 -->
<a-entity mindar-image-target="targetIndex: 0">

 <!-- 原子核 -->
<a-sphere position="0 0 0"
          radius="0.25"
          color="#ff4d4d"
          material="emissive:#ff0000; emissiveIntensity:0.6">
</a-sphere>

<!-- 電子（ぼんやり） -->
<a-sphere id="electron"
          radius="0.1"
          color="#4da6ff"
          opacity="0.7">
</a-sphere>

<!-- 電子雲（メイン） -->
<a-sphere radius="0.9"
          color="#99ccff"
          opacity="0.12">
</a-sphere>

</a-entity>

</a-scene>

<script>
document.querySelector("#startBtn").onclick = () => {
document.querySelector("a-scene").components["mindar-image-system"].start();
};

// 電子を回転させる
setInterval(()=>{
let e = document.querySelector("#electron");
let pos = e.getAttribute("position");

let angle = Math.atan2(pos.z, pos.x) + 0.05;
let r = 0.7;

e.setAttribute("position",{
x: r * Math.cos(angle),
y: 0,
z: r * Math.sin(angle)
});
},50);
</script>

</body>
</html>
