<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>水素原子AR（完成版）</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<style>
body{margin:0;}
#startBtn{
position:fixed;
top:20px;
left:20px;
z-index:999;
padding:10px 20px;
background:#06c755;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<button id="startBtn">AR開始</button>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
color-space="sRGB"
renderer="colorManagement: true;"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<!-- ===== マーカー検出 ===== -->
<a-entity mindar-image-target="targetIndex: 0">

  <!-- ★ 全体スケール -->
  <a-entity id="atom" scale="0.6 0.6 0.6">

    <!-- ===== 原子核（＋） ===== -->
    <a-entity position="0 0 0">

      <a-sphere radius="0.05"
                color="#ff4d4d"
                material="emissive:#ff0000; emissiveIntensity:0.7">
      </a-sphere>

      <a-text value="+"
              align="center"
              color="white"
              width="0.6"
              position="0 0 0.07"
              material="emissive:white">
      </a-text>

    </a-entity>

    <!-- ===== 電子雲 ===== -->
    <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 30000">

      <!-- 枠 -->
      <a-sphere radius="0.5"
                color="#66ccff"
                material="wireframe:true; opacity:0.15">
      </a-sphere>

      <!-- 外側 -->
      <a-sphere radius="0.5"
                color="#99ccff"
                opacity="0.08">
      </a-sphere>

      <!-- 中間 -->
      <a-sphere radius="0.42"
                color="#66aaff"
                opacity="0.15">
      </a-sphere>

      <!-- 内側 -->
      <a-sphere radius="0.3"
                color="#3399ff"
                opacity="0.25">
      </a-sphere>

    </a-entity>

    <!-- ===== 電子（−） ===== -->
    <a-entity id="electron">

      <a-sphere radius="0.03"
                color="#4da6ff"
                material="emissive:#4da6ff; emissiveIntensity:1.2">
      </a-sphere>

      <a-text value="−"
              align="center"
              color="white"
              width="0.5"
              position="0 0 0.06"
              material="emissive:white">
      </a-text>

    </a-entity>

  </a-entity>

</a-entity>

</a-scene>

<script>

// ===== AR開始 =====
document.querySelector("#startBtn").onclick = () => {
  document.querySelector("a-scene").components["mindar-image-system"].start();
};

// ===== 基準半径（周期対応） =====
let baseR = 0.5;

// ===== 電子の動き =====
let angle = Math.random()*Math.PI*2;

setInterval(()=>{

  // 雲の内側で動く（はみ出さない）
  let r = baseR * (0.6 + 0.2*Math.sin(Date.now()*0.002));

  // 回転
  angle += 0.035;

  // 上下ゆらぎ
  let y = 0.15*Math.sin(angle*2);

  let e = document.querySelector("#electron");

  e.setAttribute("position",{
    x: r * Math.cos(angle),
    y: y,
    z: r * Math.sin(angle)
  });

},30);

</script>

</body>
</html>
